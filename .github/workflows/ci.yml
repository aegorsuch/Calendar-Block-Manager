name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  policy-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run policy checks
        run: npm run check:policy
              run: npm run check:policy

        unit-tests:
          runs-on: ubuntu-latest
          steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 20
            - name: Run tests
              run: npm test

        lint:
          runs-on: ubuntu-latest
          steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 20
            - name: Install dependencies
              run: npm install
            - name: Run ESLint
              run: npm run lint

        coverage:
          runs-on: ubuntu-latest
          steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 20
            - name: Install dependencies
              run: npm install
            - name: Run coverage
              run: npm run coverage
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                token: ${{ secrets.CODECOV_TOKEN }}
                files: ./coverage/*.json
                flags: unittests
                name: codecov-coverage
                fail_ci_if_error: true

        release:
          runs-on: ubuntu-latest
          needs: [unit-tests, lint, coverage]
          if: github.ref == 'refs/heads/main'
          steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 20
            - name: Install dependencies
              run: npm install
            - name: Run semantic-release
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx semantic-release
                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                - name: Run tests
                  run: npm test

            lint:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                - name: Install dependencies
                  run: npm install
                - name: Run ESLint
                  run: npm run lint

            coverage:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                - name: Install dependencies
                  run: npm install
                - name: Run coverage
                  run: npm run coverage
                - name: Upload coverage to Codecov
                  uses: codecov/codecov-action@v4
                  with:
                    token: ${{ secrets.CODECOV_TOKEN }}
                    files: ./coverage/*.json
                    flags: unittests
                    name: codecov-coverage
                    fail_ci_if_error: true

            release:
              runs-on: ubuntu-latest
              needs: [unit-tests, lint, coverage]
              if: github.ref == 'refs/heads/main'
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                - name: Install dependencies
                  run: npm install
                - name: Run semantic-release
                  env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  run: npx semantic-release
      - name: Run tests
        run: npm test
